name: Deploy presentation to GitHub Pages

# Auto-deploy the reveal.js video deck (presentation/) to GitHub Pages whenever
# the presentation files change on the default branch.
on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - '.github/workflows/deploy-presentation.yml'
  workflow_dispatch:        # allow manual runs from the Actions tab

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Serve the deck under /slides (not the site root). The presentation/ folder
      # is staged into _site/slides/, and the bare root redirects there.
      - name: Stage site (deck under /slides)
        run: |
          mkdir -p _site/slides
          cp -r presentation/. _site/slides/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Progressive Cramming</title>
          <meta http-equiv="refresh" content="0; url=./slides/">
          <p><a href="./slides/">Progressive Cramming — video presentation →</a></p>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
